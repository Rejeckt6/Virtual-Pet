<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TEST 999</title>

<style>
/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;

    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* =========================
   DEVICE WRAPPER
========================= */

#device{
    position:relative;

    width:min(90vw, 700px);

    aspect-ratio:1 / 1;
}

/* =========================
   SHELL IMAGE
========================= */

#shellArt{
    position:absolute;
    inset:0;

    background-image:url("assets/ui/rejeckt-shell.png");

    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;

    image-rendering:pixelated;

    z-index:1;
}

/* =========================
   GAME SCREEN
========================= */

#game{
    position:absolute;

    /* SCREEN ALIGNMENT */
    left:31%;
    top:25%;

    width:38%;
    height:35%;

    background:#a4ad95;

    overflow:hidden;

    border-radius:4px;

    z-index:2;
}

/* =========================
   SCORE
========================= */

#score{
    position:absolute;

    top:6px;
    left:6px;

    font-size:14px;
    font-weight:bold;

    color:#1c240f;

    z-index:10;
}

/* =========================
   PET
========================= */

#pet{
    position:absolute;

    width:96px;
    height:96px;

    bottom:0;
    left:80px;

    background-repeat:no-repeat;

    image-rendering:pixelated;

    z-index:5;
}

/* =========================
   ITEMS
========================= */

.item{
    position:absolute;

    width:32px;
    height:32px;

    background-repeat:no-repeat;

    image-rendering:pixelated;
}
/* =========================
   BUTTONS
========================= */
document.getElementById("btn-left").onclick = moveLeft;
document.getElementById("btn-right").onclick = moveRight;

/* A = form swap */
document.getElementById("btn-a").onclick = ()=>{

    if(currentPet === "base"){
        loadPet("balanced");
    }
    else if(currentPet === "balanced"){
        loadPet("strong");
    }
    else{
        loadPet("base");
    }

    playRow(0);
};

/* B = sleep */
document.getElementById("btn-b").onclick = ()=>{

    playRow(4);

    setTimeout(()=>{
        playRow(0);
    },2000);
};

/* keyboard */
document.addEventListener("keydown", e=>{

    if(e.key === "ArrowLeft") moveLeft();
    if(e.key === "ArrowRight") moveRight();

});
</script>

</body>
</html>
