<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rejeckt Pet</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#shell{
    position:relative;
    width:min(95vw, 700px);
    aspect-ratio:430 / 760;

    background-image:url("assets/ui/rejeckt-shell.png");
    background-size:100% 100%;
    background-repeat:no-repeat;
}

/* Screen placement */
#game{
    position:absolute;

    left:19%;
    top:13%;

    width:61%;
    height:38%;

    background:#8bac0f;
    overflow:hidden;
    border-radius:10px;
}

/* Pet */
#pet{
    position:absolute;
    width:96px;
    height:96px;
    bottom:10px;
    left:110px;
    background-repeat:no-repeat;
    image-rendering:pixelated;
}

/* Falling Items */
.item{
    position:absolute;
    width:48px;
    height:48px;
    background-repeat:no-repeat;

    /* 4 columns × 2 rows */
    background-size:192px 96px;

    image-rendering:pixelated;
}

/* Score */
#score{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    color:#222;
}

/* Controls */
.controls{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-top:15px;
}

button{
    position:absolute;
    opacity:0;
    border:none;
    background:none;
}

/* Dpad */
#btn-left{left:8%; top:63%; width:10%; height:8%;}
#btn-right{left:25%; top:63%; width:10%; height:8%;}
#btn-up{left:16%; top:56%; width:10%; height:8%;}
#btn-down{left:16%; top:71%; width:10%; height:8%;}

/* A/B */
#btn-a{left:77%; top:58%; width:12%; height:8%;}
#btn-b{left:63%; top:66%; width:12%; height:8%;}

/* Select/Start */
#btn-select{left:42%; top:80%; width:10%; height:4%;}
#btn-start{left:56%; top:80%; width:10%; height:4%;}

button:active{
    transform:scale(.92);
}
</style>
</head>

<body>

<div id="shell">

    <div id="game"></div>

    <button id="btn-up"></button>
    <button id="btn-left"></button>
    <button id="btn-right"></button>
    <button id="btn-down"></button>

    <button id="btn-a"></button>
    <button id="btn-b"></button>

    <button id="btn-start"></button>
    <button id="btn-select"></button>

</div>

<script>
const game = document.getElementById("game");

/* score box */
const scoreText = document.createElement("div");
scoreText.id = "score";
scoreText.style.position = "absolute";
scoreText.style.top = "5px";
scoreText.style.left = "5px";
scoreText.style.fontSize = "14px";
scoreText.innerHTML = "Score: 0";
game.appendChild(scoreText);

/* pet */
const pet = document.createElement("div");
pet.id = "pet";
game.appendChild(pet);

let petX = 110;
let score = 0;
let currentPet = "base";
let currentFrame = 0;
let animTimer;

function loadPet(name){
  currentPet = name;
  pet.style.backgroundImage = `url("assets/pet/${name}.png")`;
  pet.style.backgroundSize = "384px 480px";
}

function drawFrame(col,row){
  pet.style.backgroundPosition = `${-col*96}px ${-row*96}px`;
}

function playRow(row){
  clearInterval(animTimer);

  if(row===4){
    drawFrame(0,4);
    return;
  }

  currentFrame = 0;

  animTimer = setInterval(()=>{
    drawFrame(currentFrame,row);
    currentFrame++;
    if(currentFrame>3) currentFrame=0;
  },250);
}

function moveLeft(){
  petX -= 32;
  if(petX < 0) petX = 0;
  pet.style.left = petX + "px";
}

function moveRight(){
  petX += 32;
  if(petX > 224) petX = 224;
  pet.style.left = petX + "px";
}

loadPet("base");
playRow(0);

const items = [
 "assets/items/food.png",
 "assets/items/drink.png"
];

function spawnItem(){

  const item = document.createElement("div");
  item.className = "item";

  let chosen = items[Math.floor(Math.random()*items.length)];

  item.style.backgroundImage = `url("${chosen}")`;
  item.style.backgroundPosition = "0px 0px";

  let lane = [0,64,128,192,256][Math.floor(Math.random()*5)];
  let x = lane;
  let y = 0;

  item.style.left = x + "px";
  item.style.top = y + "px";

  game.appendChild(item);

  let fall = setInterval(()=>{

    y += 4;
    item.style.top = y + "px";

    if(y > 170 && Math.abs(x-petX) < 50){
      score++;
      scoreText.innerHTML = "Score: " + score;
      item.remove();
      clearInterval(fall);

      playRow(1);

      setTimeout(()=>playRow(0),1000);
    }

    if(y > 240){
      item.remove();
      clearInterval(fall);
    }

  },50);
}

setInterval(spawnItem,1400);

/* buttons */
document.getElementById("btn-left").onclick = moveLeft;
document.getElementById("btn-right").onclick = moveRight;

document.getElementById("btn-a").onclick = ()=>{
  if(currentPet==="base") loadPet("balanced");
  else if(currentPet==="balanced") loadPet("strong");
  else loadPet("base");

  playRow(0);
};

document.getElementById("btn-b").onclick = ()=>{
  playRow(4);
  setTimeout(()=>playRow(0),2000);
};
</script>
