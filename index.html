<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rejeckt Pet</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#shell{
    position:relative;
    width:430px;
    height:760px;
    background-image:url("assets/ui/rejeckt-shell.png");
    background-size:contain;
    background-repeat:no-repeat;
}

/* Screen placement */
#game{
    position:absolute;
    left:95px;
    top:92px;
    width:240px;
    height:240px;
    background:#8bac0f;
    overflow:hidden;
    border-radius:8px;
}

/* Pet */
#pet{
    position:absolute;
    width:96px;
    height:96px;
    bottom:10px;
    left:110px;
    background-repeat:no-repeat;
    image-rendering:pixelated;
}

/* Falling Items */
.item{
    position:absolute;
    width:48px;
    height:48px;
    background-repeat:no-repeat;

    /* 4 columns × 2 rows */
    background-size:192px 96px;

    image-rendering:pixelated;
}

/* Score */
#score{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    color:#222;
}

/* Controls */
.controls{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-top:15px;
}

button{
    position:absolute;
    opacity:0;
    border:none;
}

/* Dpad */
#btn-up{left:55px; top:455px; width:70px; height:45px;}
#btn-down{left:55px; top:545px; width:70px; height:45px;}
#btn-left{left:10px; top:500px; width:55px; height:70px;}
#btn-right{left:115px; top:500px; width:55px; height:70px;}

/* A/B */
#btn-a{left:335px; top:470px; width:65px; height:65px;}
#btn-b{left:255px; top:530px; width:65px; height:65px;}

/* Start Select */
#btn-select{left:170px; top:620px; width:60px; height:30px;}
#btn-start{left:250px; top:620px; width:60px; height:30px;}

button:active{
    transform:scale(.92);
}
</style>
</head>

<body>

<div id="shell">

    <div id="game"></div>

    <button id="btn-up"></button>
    <button id="btn-left"></button>
    <button id="btn-right"></button>
    <button id="btn-down"></button>

    <button id="btn-a"></button>
    <button id="btn-b"></button>

    <button id="btn-start"></button>
    <button id="btn-select"></button>

</div>

</body>

<script>
const game = document.getElementById("game");
const scoreText = document.getElementById("score");

/* =========================
   PET SYSTEM
========================= */

const pet = document.createElement("div");
pet.id = "pet";
game.appendChild(pet);

let petX = 110;
let currentPet = "base";
let currentRow = 0;
let currentFrame = 0;
let animTimer;

/* load sheet */
function loadPet(name){
    currentPet = name;
    pet.style.backgroundImage =
  `url("assets/pet/${name}.png")`;

    /* 4 cols x 5 rows, each displayed 96x96 */
    pet.style.backgroundSize = "384px 480px";
}

/* draw frame */
function drawFrame(col,row){
    pet.style.backgroundPosition =
      `${-col*96}px ${-row*96}px`;
}

/* animate row */
function playRow(row){

    clearInterval(animTimer);
    currentRow = row;
    currentFrame = 0;

    /* sleep row = static frame */
    if(row === 4){
        drawFrame(0,4);
        return;
    }

    animTimer = setInterval(()=>{
        drawFrame(currentFrame,row);
        currentFrame++;
        if(currentFrame > 3) currentFrame = 0;
    },250);
}

/* movement */
function moveLeft(){
    petX -= 32;
    if(petX < 0) petX = 0;
    pet.style.left = petX + "px";
}

function moveRight(){
    petX += 32;
    if(petX > 224) petX = 224;
    pet.style.left = petX + "px";
}

/* start pet */
loadPet("base");
playRow(0);

/* =========================
   FALLING ITEM GAME
========================= */

let score = 0;
const lanes = [0,64,128,192,256];

const items = [
 "assets/items/food.png",
 "assets/items/drink.png"
];

function spawnItem(){

    const item = document.createElement("div");
item.className = "item";

let chosen =
items[Math.floor(Math.random()*items.length)];

item.style.backgroundImage =
  `url("${chosen}")`;

item.style.backgroundPosition = "0px 0px";
      items[Math.floor(Math.random()*items.length)];

    let lane = lanes[Math.floor(Math.random()*lanes.length)];
    let x = lane;
    let y = 0;

    item.style.left = x + "px";
    item.style.top = y + "px";

    game.appendChild(item);

    let fall = setInterval(()=>{

        y += 4;
        item.style.top = y + "px";

        /* catch */
        if(y > 170 && Math.abs(x - petX) < 50){
            score++;
            scoreText.innerHTML = "Score: " + score;
            item.remove();
            clearInterval(fall);

            playRow(1); /* eat */

            setTimeout(()=>{
                playRow(0);
            },1000);
        }

        /* miss */
        if(y > 240){
            item.remove();
            clearInterval(fall);
        }

    },50);
}

setInterval(spawnItem,1400);

/* =========================
   BUTTONS
========================= */

document.getElementById("btn-left").onclick = moveLeft;
document.getElementById("btn-right").onclick = moveRight;

/* A = cycle forms */
document.getElementById("btn-a").onclick = actionA = ()=>{

    if(currentPet === "base"){
        loadPet("balanced");
    }else if(currentPet === "balanced"){
        loadPet("strong");
    }else{
        loadPet("base");
    }

    playRow(0);
};

	/* B = sleep */
	document.getElementById("btn-b").onclick = actionB; = ()=>{
	    playRow(4);
	
    setTimeout(()=>{
        playRow(0);
    },2000);
};

/* keyboard support */
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft") moveLeft();
    if(e.key==="ArrowRight") moveRight();
});
</script>

</body>
</html>
